<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <!-- Background -->
  <rect width="72" height="72" rx="16" fill="url(#grad)"/>

  <!-- Calendar body -->
  <rect x="14" y="20" width="32" height="32" rx="4" fill="white" fill-opacity="0.95"/>

  <!-- Calendar header -->
  <rect x="14" y="20" width="32" height="10" rx="4" fill="white"/>
  <rect x="14" y="26" width="32" height="4" fill="white"/>

  <!-- Calendar rings -->
  <rect x="22" y="16" width="3" height="8" rx="1.5" fill="white"/>
  <rect x="35" y="16" width="3" height="8" rx="1.5" fill="white"/>

  <!-- Calendar grid dots -->
  <circle cx="22" cy="38" r="2" fill="#7c5cff"/>
  <circle cx="30" cy="38" r="2" fill="#7c5cff"/>
  <circle cx="38" cy="38" r="2" fill="#7c5cff"/>
  <circle cx="22" cy="46" r="2" fill="#7c5cff"/>
  <circle cx="30" cy="46" r="2" fill="#7c5cff"/>

  <!-- Sync arrows -->
  <g fill="white">
    <!-- Top arrow (curved) -->
    <path d="M52 28c0-5.5-4.5-10-10-10h-2v3h2c3.9 0 7 3.1 7 7h-4l5 6 5-6h-3z"/>
    <!-- Bottom arrow (curved) -->
    <path d="M52 44c0 5.5-4.5 10-10 10h-2v-3h2c3.9 0 7-3.1 7-7h-4l5-6 5 6h-3z"/>
  </g>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
</svg>
